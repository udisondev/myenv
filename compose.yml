services:
  devenv:
    build:
      context: .
      args:
        USER: ${USER:-sergeik}
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    image: myenv:latest
    container_name: devenv
    hostname: devenv
    ports:
      - "127.0.0.1:2222:22"
    volumes:
      - .:/home/${USER:-sergeik}/myenv:ro
      - ~/Projects:/home/${USER:-sergeik}/Projects
      - devenv-home:/home/${USER:-sergeik}
      - ${SSH_AUTH_SOCK:-/dev/null}:/ssh-agent
      - ${SSH_PUBKEY:-~/.ssh/id_ed25519.pub}:/etc/ssh/host_authorized_key:ro
    environment:
      SSH_AUTH_SOCK: /ssh-agent
      USER: ${USER:-sergeik}
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  devenv-home:
