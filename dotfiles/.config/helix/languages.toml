[language-server.gopls]
command = "gopls"

[language-server.gopls.config]
usePlaceholders = true
completeUnimported = true
staticcheck = true
gofumpt = true
semanticTokens = true

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
compositeLiteralTypes = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

[language-server.gopls.config.analyses]
unusedparams = true
unusedwrite = true
nilness = true
shadow = true

[[language]]
name = "go"
language-servers = ["gopls"]
auto-format = true
formatter = { command = "gofumpt" }

[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt", args = ["--edition", "2021"] }

# TinyGo для отдельных проектов: положите .helix/languages.toml в корень
# проекта (или в подкаталог с прошивкой) с build-тегами под нужный target.
# Получить тэги: `tinygo info <target>` (esp32, esp32-coreboard-v2, и т.д.).
#
# Пример .helix/languages.toml для ESP32:
#
# [language-server.gopls.config]
# build.buildFlags = ["-tags=xtensa,baremetal,esp32,esp,tinygo,purego,osusergo,math_big_pure_go,gc.conservative,scheduler.tasks,serial.uart,tinygo.unicore"]
# build.env = { GOROOT = "<путь из `tinygo info esp32` → cached GOROOT>" }
#
# [[language]]
# name = "go"
# language-servers = ["gopls"]
