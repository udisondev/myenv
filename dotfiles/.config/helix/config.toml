theme = "tokyonight_moon"

[editor]
line-number="relative"
bufferline="multiple"
end-of-line-diagnostics = "hint"
idle-timeout = 0
rulers = [100]
trim-trailing-whitespace = true

# [editor.whitespace]
# render.space = "all"
# render.tab = "all"
# render.newline = "none"  # опционально, чтобы не захламлять

[editor.file-picker]
hidden = false

[editor.cursor-shape]
insert = "bar"

[editor.inline-diagnostics]
cursor-line = "error"

[editor.indent-guides]
render = true
character = "|"
ship-levels = 1

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]
H = "jump_view_left"
L = "jump_view_right"

[keys.normal.space]
q = ":qa"
Q = ":qa!"
x = ":bc"
X = ":bc!"
w = ":wa"
W = ":wa!"
n = [
  ':sh rm -f /tmp/unique-file',
  ':insert-output yazi %{buffer_name} --chooser-file=/tmp/unique-file',
  ':insert-output echo "\x1b[?1049h\x1b[?2004h" > /dev/tty',
  ':open %sh{cat /tmp/unique-file}',
  ':redraw',
  ':set mouse false',
  ':set mouse true',
]
t = ":sh zellij action new-pane --direction down --cwd \"%sh{dirname $(realpath '%{buffer_name}')}\""
u = ":pipe gocase"
m = ":sh zellij run --floating --width 80%% --height 80%% --x 10%% --y 10%% -- bash -c 'glow -p \"%{buffer_name}\"; zellij action close-pane'"
B = ":echo %sh{git blame -L %{cursor_line},+1 %{buffer_name}}"
T = ":sh zellij action new-pane --direction down --cwd \"$PWD\""

[keys.normal.space.l]
d = ":sh zellij run --floating --width 80%% --height 80%% --x 10%% --y 10%% --cwd \"$PWD\" -- bash -c 'lazydocker; zellij action close-pane'"
g = ":sh zellij run --floating --width 80%% --height 80%% --x 10%% --y 10%% --cwd \"$PWD\" -- bash -c 'lazygit; zellij action close-pane'"


# [keys.select.space]
