[devenv]
image=archlinux:latest
home=${HOME}/.distrobox-homes/devenv
additional_volumes="${HOME}/dev-env:/home/${USER}/dev-env:ro;${HOME}/Projects:/home/${USER}/Projects:rw"
additional_packages="base-devel git zsh oh-my-zsh-git zsh-syntax-highlighting zsh-autosuggestions zsh-history-substring-search helix zellij yazi glow lazygit lazydocker btop github-cli fzf ripgrep fd zoxide bat eza tig git-delta jq go rustup nodejs npm pkgfile openssh mosh trzsz wl-clipboard man-db less which sudo ghostty-terminfo"
init_hooks="/home/${USER}/dev-env/bootstrap.sh"
init=true
pull=true
